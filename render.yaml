services:
  - type: web
    name: interview-question-ai-backend
    env: python
    plan: free
    buildCommand: bash backend/build.sh
    startCommand: gunicorn config.wsgi:application --chdir backend --bind 0.0.0.0:$PORT
    envVars:
      - key: ALLOWED_HOSTS
        value: interview-question-ai-ikvw.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://role-base-ai-interview-question-gen.vercel.app
